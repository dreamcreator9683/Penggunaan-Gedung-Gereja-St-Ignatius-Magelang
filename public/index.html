        h2, h3 { color: #ffc107; margin-bottom: 5px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 13px; }
        input, select { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 13px; }
        input:focus, select:focus { border-color: #ffc107; outline: none; }
        
        button { width: 100%; padding: 10px; background: #ffc107; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background: #e0a800; }
        
        /* --- STYLING KALENDER --- */
        .kalender-box { background: #222; border: 1px solid #444; padding: 15px; border-radius: 8px; }
        .kalender-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: #ffc107; }
        .kalender-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 12px; font-weight: bold; color: #888; margin-bottom: 5px;}
        .kalender-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { padding: 8px 0; text-align: center; background: #333; border-radius: 4px; cursor: pointer; font-size: 13px; position: relative; }
        .day:hover { background: #444; }
        .day.terisi { background: #dc3545; color: white; font-weight: bold; box-shadow: 0 0 5px #dc3545; }
        .day.terisi::after { content: ''; width: 6px; height: 6px; background: #ffc107; border-radius: 50%; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }
        .day.empty { background: transparent; cursor: default; }

        /* --- NOTIFIKASI POPUP DETAIL --- */
        .notif-detail { background: #2d2d2d; border-left: 5px solid #ffc107; padding: 12px; border-radius: 4px; display: none; margin-top: 5px; }
        .notif-title { font-weight: bold; color: #ffc107; margin-bottom: 6px; font-size: 14px;}
        .notif-item { font-size: 13px; border-bottom: 1px solid #444; padding: 6px 0; }
        .notif-item:last-child { border-bottom: none; }

        /* Grouping List */
        .group-tempat { background: #252525; border: 1px solid #444; border-radius: 6px; padding: 12px; margin-top: 5px;}
        .nama-header-tempat { background: #ffc107; color: #000; padding: 4px 8px; font-weight: bold; border-radius: 4px; margin-bottom: 8px; font-size: 14px; }
        
        .link-admin { text-align: right; font-size: 12px; }
        .link-admin a { color: #ffc107; text-decoration: none; }
    </style>
</head>
<body>

    <div class="sisi-kiri">
        <div class="link-admin"><a href="admin.html">Dashboard Admin &rarr;</a></div>
        <h2>Pemesanan Tempat</h2>
        
        <form id="formBooking">
            <div class="form-group">
                <label>Nama Pemesan:</label>
                <input type="text" id="nama" required>
            </div>
            <div class="form-group">
                <label>Nomor HP / WhatsApp (Aktif):</label>
                <input type="tel" id="nomorHp" placeholder="Contoh: 0812xxxxxx" required>
            </div>
            <div class="form-group">
                <label>Acara / Kegunaan Gedung:</label>
                <input type="text" id="acara" placeholder="Contoh: Latihan Koor / Rapat Dewan Paroki" required>
            </div>
            <div class="form-group">
                <label>Pilih Ruangan/Gedung:</label>
                <select id="tempat" required></select>
            </div>
            <div class="form-group">
                <label>Tanggal:</label>
                <input type="date" id="tanggal" required>
            </div>
            <div class="form-group">
                <label>Jam Mulai s/d Selesai:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="time" id="jamMulai" required>
                    <input type="time" id="jamSelesai" required>
                </div>
            </div>
            <button type="submit">Ajukan Pemesanan Tempat</button>
        </form>

        <hr style="border-color: #333;">

        <h3>Kalender Cek Jadwal</h3>
        <div class="kalender-box">
            <div class="kalender-header">
                <button onclick="bulanSebelumnya()" style="width:auto; padding:5px 10px; font-size:12px;">&larr;</button>
                <span id="bulanTahunLabel"></span>
                <button onclick="bulanBerikutnya()" style="width:auto; padding:5px 10px; font-size:12px;">&rarr;</button>
            </div>
            <div class="kalender-days">
                <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
            </div>
            <div id="kalenderGrid" class="kalender-grid"></div>
        </div>

        <div id="notifBox" class="notif-detail"></div>

        <h3>Daftar Jadwal (Grouping)</h3>
        <div id="containerJadwal"></div>
    </div>

    <div class="sisi-kanan"></div>

    <script>
        let semuaBooking = [];
        let tanggalSekarang = new Date();
        let bulanAktif = tanggalSekarang.getMonth();
        let tahunAktif = tanggalSekarang.getFullYear();

        const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        async function muatData() {
            try {
                // 1. Muat Dropdown Pilihan Ruangan (Dengan Pengingat Pilihan)
                const resRooms = await fetch('/api/rooms');
                const rooms = await resRooms.json();
                const selectTempat = document.getElementById('tempat');
                
                // INGAT PILIHAN USER SAAT INI SEBELUM DI-REFRESH
                const pilihanSaatIni = selectTempat.value; 

                selectTempat.innerHTML = '';
                rooms.forEach(room => {
                    let opt = document.createElement('option');
                    opt.value = room; 
                    opt.innerHTML = room;
                    selectTempat.appendChild(opt);
                });

                // KEMBALIKAN KE PILIHAN USER SEMULA JIKA PILIHAN ITU MASIH ADA
                if (pilihanSaatIni && rooms.includes(pilihanSaatIni)) {
                    selectTempat.value = pilihanSaatIni;
                }

                // 2. Muat Jadwal & Proses Grouping Per Tempat (Sama seperti kode sebelumnya...)
                const resBookings = await fetch('/api/bookings');
                semuaBooking = await resBookings.json();
                
                renderKalender();

                const container = document.getElementById('containerJadwal');
                container.innerHTML = '';

                if (semuaBooking.length === 0) {
                    container.innerHTML = "<p style='color:#888; font-style:italic;'>Belum ada jadwal terisi.</p>";
                    return;
                }

                const grupJadwal = {};
                semuaBooking.forEach(b => {
                    if (!grupJadwal[b.tempat]) grupJadwal[b.tempat] = [];
                    grupJadwal[b.tempat].push(b);
                });

                for (const tempat in grupJadwal) {
                    const boxGrup = document.createElement('div');
                    boxGrup.className = 'group-tempat';
                    boxGrup.innerHTML = `<div class='nama-header-tempat'>🏢 ${tempat}</div>`;
                    
                    grupJadwal[tempat].forEach(b => {
                        const item = document.createElement('div');
                        item.style.fontSize = '13px';
                        item.style.padding = '5px 0';
                        item.innerHTML = `📅 <strong>${b.tanggal}</strong> (${b.jamMulai} - ${b.jamSelesai})<br>⛪ Acara: ${b.acara} | 👤 ${b.nama}`;
                        boxGrup.appendChild(item);
                    });
                    container.appendChild(boxGrup);
                }
            } catch (error) {
                console.error("Gagal memuat data:", error);
            }
        }

        // --- LOGIKA KALENDER ---
        function renderKalender() {
            document.getElementById('bulanTahunLabel').innerText = `${namaBulan[bulanAktif]} ${tahunAktif}`;
            const grid = document.getElementById('kalenderGrid');
            grid.innerHTML = '';

            const hariPertama = new Date(tahunAktif, bulanAktif, 1).getDay();
            const jumlahHari = new Date(tahunAktif, bulanAktif + 1, 0).getDate();

            // Slot kosong awal bulan
            for (let i = 0; i < hariPertama; i++) {
                let div = document.createElement('div');
                div.className = 'day empty';
                grid.appendChild(div);
            }

            // Isi hari/tanggal
            for (let hari = 1; hari <= jumlahHari; hari++) {
                let div = document.createElement('div');
                div.className = 'day';
                div.innerText = hari;

                // Format ke string YYYY-MM-DD
                let mm = String(bulanAktif + 1).padStart(2, '0');
                let dd = String(hari).padStart(2, '0');
                let stringTanggal = `${tahunAktif}-${mm}-${dd}`;

                // Cek apakah ada booking di tanggal ini
                let adaBooking = semuaBooking.filter(b => b.tanggal === stringTanggal);
                if (adaBooking.length > 0) {
                    div.classList.add('terisi');
                }

                // Efek Klik Tanggal Kalender
                div.onclick = () => tampilkanNotifDetail(stringTanggal, hari, adaBooking);

                grid.appendChild(div);
            }
        }

        function tampilkanNotifDetail(tgl, hari, listBooking) {
            const notifBox = document.getElementById('notifBox');
            if (listBooking.length === 0) {
                notifBox.style.display = 'block';
                notifBox.innerHTML = `<div class='notif-title'>📅 Tanggal ${hari} ${namaBulan[bulanAktif]}:</div><p style="font-size:13px; color:#aaa;">Jadwal Kosong. Tempat siap dipesan!</p>`;
                return;
            }

            notifBox.style.display = 'block';
            let htmlContent = `<div class='notif-title'>⚠️ Tanggal ${hari} ${namaBulan[bulanAktif]} Terpakai:</div>`;
            
            listBooking.forEach(b => {
                htmlContent += `
                    <div class="notif-item">
                        ⏰ <strong>${b.jamMulai} - ${b.jamSelesai}</strong><br>
                        🏢 Tempat: ${b.tempat}<br>
                        ⛪ Acara: <span style="color:#ffc107">${b.acara}</span><br>
                        👤 Kontak: ${b.nama}
                    </div>
                `;
            });
            notifBox.innerHTML = htmlContent;
        }

        function bulanSebelumnya() { bulanAktif--; if(bulanAktif < 0){ bulanAktif=11; tahunAktif--; } renderKalender(); }
        function bulanBerikutnya() { bulanAktif++; if(bulanAktif > 11){ bulanAktif=0; tahunAktif++; } renderKalender(); }

        // --- SUBMIT FORM ---
        document.getElementById('formBooking').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                nama: document.getElementById('nama').value,
                nomorHp: document.getElementById('nomorHp').value,
                acara: document.getElementById('acara').value,
                tempat: document.getElementById('tempat').value,
                tanggal: document.getElementById('tanggal').value,
                jamMulai: document.getElementById('jamMulai').value,
                jamSelesai: document.getElementById('jamSelesai').value
            };

            const respons = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const hasil = await respons.json();
            alert(hasil.message || "Pemesanan berhasil!");
            if (respons.ok) { 
                document.getElementById('formBooking').reset(); 
                document.getElementById('notifBox').style.display = 'none';
                muatData(); 
            }
        });

        muatData();
        setInterval(muatData, 30000);
    </script>
</body>
</html>
